[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/functions/**"]

# Background functions ficam em /netlify/functions e têm sufixo -background
# A função generate.ts será chamada como background function

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
